<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minji's To-Do List</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 40px 16px;
            color: #222;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 28px;
            color: #1a1a2e;
        }

        /* 입력 폼 */
        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .form-card h2 {
            font-size: 1rem;
            margin-bottom: 16px;
            color: #555;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="date"], select, textarea {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
            background: #fafafa;
        }

        input[type="text"]:focus, input[type="date"]:focus,
        select:focus, textarea:focus {
            border-color: #6c63ff;
            background: #fff;
        }

        .input-title { flex: 2; min-width: 160px; }
        .input-desc  { flex: 3; min-width: 160px; }
        .input-priority { flex: 1; min-width: 110px; }
        .input-date { flex: 1.5; min-width: 140px; }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:hover { opacity: 0.88; }
        .btn:active { transform: scale(0.97); }

        .btn-primary  { background: #6c63ff; color: #fff; width: 100%; margin-top: 4px; }
        .btn-success  { background: #2ecc71; color: #fff; }
        .btn-danger   { background: #e74c3c; color: #fff; }
        .btn-warning  { background: #f39c12; color: #fff; }
        .btn-sm       { padding: 5px 12px; font-size: 0.82rem; }

        /* 검색 + 필터 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-wrap {
            display: flex;
            flex: 1;
            min-width: 200px;
            gap: 8px;
        }

        .search-wrap input { flex: 1; }

        .filter-wrap {
            display: flex;
            gap: 6px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: #777;
            transition: all 0.2s;
        }

        .filter-btn.active {
            border-color: #6c63ff;
            color: #6c63ff;
            background: #f0eeff;
        }

        /* 통계 바 */
        .stats {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
        }

        .stats span { font-weight: 700; color: #444; }

        /* Todo 카드 */
        .todo-list { display: flex; flex-direction: column; gap: 10px; }

        .todo-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            display: flex;
            align-items: flex-start;
            gap: 14px;
            border-left: 5px solid #ccc;
            transition: box-shadow 0.2s;
        }

        .todo-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.12); }

        .todo-card.completed { opacity: 0.6; background: #f8f8f8; }
        .todo-card.completed .todo-title { text-decoration: line-through; color: #aaa; }

        .todo-card.priority-high   { border-left-color: #e74c3c; }
        .todo-card.priority-medium { border-left-color: #f39c12; }
        .todo-card.priority-low    { border-left-color: #2ecc71; }

        .toggle-check {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #6c63ff;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .todo-body { flex: 1; }

        .todo-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .todo-desc {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 6px;
        }

        .todo-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-high   { background: #fde8e8; color: #c0392b; }
        .badge-medium { background: #fef3d0; color: #d68910; }
        .badge-low    { background: #d5f5e3; color: #1e8449; }

        .due-date {
            font-size: 0.78rem;
            color: #999;
        }

        .due-date.overdue { color: #e74c3c; font-weight: 700; }

        .todo-actions { display: flex; gap: 6px; flex-shrink: 0; }

        /* 편집 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 14px;
            padding: 30px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.18);
        }

        .modal h2 { margin-bottom: 18px; font-size: 1.1rem; color: #333; }

        .modal .form-row { flex-direction: column; }
        .modal input, .modal select { width: 100%; margin-bottom: 10px; }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 40px 0;
            font-size: 1rem;
        }

        /* v4.0.0 통계 대시보드 */
        .stats-dashboard {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .stats-dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .stats-dashboard-header h2 {
            font-size: 0.95rem;
            color: #555;
            font-weight: 600;
        }

        .stats-version-badge {
            font-size: 0.72rem;
            background: #6c63ff;
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
        }

        .stats-numbers {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .stat-box {
            flex: 1;
            background: #f7f7ff;
            border-radius: 10px;
            padding: 12px 10px;
            text-align: center;
        }

        .stat-box .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a1a2e;
            line-height: 1;
        }

        .stat-box .stat-label {
            font-size: 0.72rem;
            color: #999;
            margin-top: 4px;
        }

        .stat-box.completed-box .stat-value { color: #2ecc71; }
        .stat-box.pending-box   .stat-value { color: #e74c3c; }

        .progress-wrap { margin-bottom: 14px; }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: #888;
            margin-bottom: 5px;
        }

        .progress-bar-bg {
            background: #eee;
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #6c63ff, #2ecc71);
            transition: width 0.5s ease;
        }

        .priority-bars { display: flex; flex-direction: column; gap: 6px; }

        .priority-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .priority-row .p-label { width: 38px; font-weight: 600; }
        .priority-row .p-label.high   { color: #c0392b; }
        .priority-row .p-label.medium { color: #d68910; }
        .priority-row .p-label.low    { color: #1e8449; }

        .priority-row .p-bar-bg {
            flex: 1;
            background: #eee;
            border-radius: 20px;
            height: 7px;
            overflow: hidden;
        }

        .priority-row .p-bar-fill {
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .p-bar-fill.high   { background: #e74c3c; }
        .p-bar-fill.medium { background: #f39c12; }
        .p-bar-fill.low    { background: #2ecc71; }

        .priority-row .p-count { width: 24px; text-align: right; color: #777; font-weight: 700; }

        /* v4.0.0 Priority 필터 */
        .priority-filter-wrap {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .pf-btn {
            padding: 6px 14px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: #777;
            transition: all 0.2s;
        }

        .pf-btn.active-all    { border-color: #6c63ff; color: #6c63ff; background: #f0eeff; }
        .pf-btn.active-high   { border-color: #e74c3c; color: #e74c3c; background: #fde8e8; }
        .pf-btn.active-medium { border-color: #f39c12; color: #d68910; background: #fef3d0; }
        .pf-btn.active-low    { border-color: #2ecc71; color: #1e8449; background: #d5f5e3; }
    </style>
</head>
<body>
<div class="container">
    <h1>Minji's To-Do List <span style="font-size:0.55em;color:#6c63ff;vertical-align:middle;">v4.0.0</span></h1>

    <!-- 입력 폼 -->
    <div class="form-card">
        <h2>새 할 일 추가</h2>
        <form id="todo-form">
            <div class="form-row">
                <input class="input-title" type="text" id="title" placeholder="제목" required>
                <input class="input-desc"  type="text" id="description" placeholder="설명" required>
            </div>
            <div class="form-row">
                <select class="input-priority" id="priority">
                    <option value="high">🔴 높음</option>
                    <option value="medium" selected>🟡 보통</option>
                    <option value="low">🟢 낮음</option>
                </select>
                <input class="input-date" type="date" id="due_date">
            </div>
            <button class="btn btn-primary" type="submit">+ 추가하기</button>
        </form>
    </div>

    <!-- v4.0.0 통계 대시보드 -->
    <div class="stats-dashboard">
        <div class="stats-dashboard-header">
            <h2>통계 대시보드</h2>
            <span class="stats-version-badge">NEW v4.0.0</span>
        </div>
        <div class="stats-numbers">
            <div class="stat-box">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">전체</div>
            </div>
            <div class="stat-box completed-box">
                <div class="stat-value" id="stat-completed">0</div>
                <div class="stat-label">완료</div>
            </div>
            <div class="stat-box pending-box">
                <div class="stat-value" id="stat-pending">0</div>
                <div class="stat-label">미완료</div>
            </div>
        </div>
        <div class="progress-wrap">
            <div class="progress-label">
                <span>완료율</span>
                <span id="stat-rate">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="stat-bar" style="width:0%"></div>
            </div>
        </div>
        <div class="priority-bars">
            <div class="priority-row">
                <span class="p-label high">높음</span>
                <div class="p-bar-bg"><div class="p-bar-fill high" id="bar-high" style="width:0%"></div></div>
                <span class="p-count" id="cnt-high">0</span>
            </div>
            <div class="priority-row">
                <span class="p-label medium">보통</span>
                <div class="p-bar-bg"><div class="p-bar-fill medium" id="bar-medium" style="width:0%"></div></div>
                <span class="p-count" id="cnt-medium">0</span>
            </div>
            <div class="priority-row">
                <span class="p-label low">낮음</span>
                <div class="p-bar-bg"><div class="p-bar-fill low" id="bar-low" style="width:0%"></div></div>
                <span class="p-count" id="cnt-low">0</span>
            </div>
        </div>
    </div>

    <!-- 검색 + 필터 -->
    <div class="toolbar">
        <div class="search-wrap">
            <input type="text" id="search-input" placeholder="제목으로 검색...">
            <button class="btn btn-warning btn-sm" onclick="searchTodos()">검색</button>
            <button class="btn btn-sm" style="background:#eee;color:#555;" onclick="clearSearch()">초기화</button>
        </div>
        <div class="filter-wrap">
            <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
            <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">완료</button>
        </div>
    </div>

    <!-- v4.0.0 Priority 필터 -->
    <div class="priority-filter-wrap">
        <button class="pf-btn active-all" onclick="setPriorityFilter('all', this)">전체</button>
        <button class="pf-btn" onclick="setPriorityFilter('high', this)">🔴 높음</button>
        <button class="pf-btn" onclick="setPriorityFilter('medium', this)">🟡 보통</button>
        <button class="pf-btn" onclick="setPriorityFilter('low', this)">🟢 낮음</button>
    </div>

    <!-- 목록 -->
    <div class="todo-list" id="todo-list"></div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal">
        <h2>할 일 수정</h2>
        <div class="form-row">
            <input type="text" id="edit-title" placeholder="제목">
            <input type="text" id="edit-description" placeholder="설명">
            <select id="edit-priority">
                <option value="high">🔴 높음</option>
                <option value="medium">🟡 보통</option>
                <option value="low">🟢 낮음</option>
            </select>
            <input type="date" id="edit-due_date">
        </div>
        <div class="modal-actions">
            <button class="btn" style="background:#eee;color:#555;" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" style="width:auto;" onclick="saveEdit()">저장</button>
        </div>
    </div>
</div>

<script>
    let currentFilter = 'all';
    let currentPriority = 'all';
    let allTodos = [];
    let editingId = null;

    async function fetchStats() {
        const res = await fetch('/todos/stats');
        const data = await res.json();
        document.getElementById('stat-total').textContent     = data.total;
        document.getElementById('stat-completed').textContent = data.completed;
        document.getElementById('stat-pending').textContent   = data.pending;
        document.getElementById('stat-rate').textContent      = data.completion_rate + '%';
        document.getElementById('stat-bar').style.width       = data.completion_rate + '%';

        const max = Math.max(data.by_priority.high, data.by_priority.medium, data.by_priority.low, 1);
        ['high','medium','low'].forEach(p => {
            const cnt = data.by_priority[p];
            document.getElementById('cnt-' + p).textContent    = cnt;
            document.getElementById('bar-' + p).style.width    = (cnt / max * 100) + '%';
        });
    }

    async function fetchTodos() {
        let url = '/todos';
        if (currentPriority !== 'all') url += `?priority=${currentPriority}`;
        const res = await fetch(url);
        allTodos = await res.json();
        renderTodos(allTodos);
        fetchStats();
    }

    function setPriorityFilter(p, btn) {
        currentPriority = p;
        document.querySelectorAll('.pf-btn').forEach(b => b.className = 'pf-btn');
        btn.classList.add('active-' + p);
        fetchTodos();
    }

    function renderTodos(todos) {
        const today = new Date().toISOString().split('T')[0];
        let filtered = todos;
        if (currentFilter === 'active')    filtered = todos.filter(t => !t.completed);
        if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

        const list = document.getElementById('todo-list');
        list.innerHTML = '';

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state">할 일이 없습니다 🎉</div>';
            return;
        }

        filtered.forEach(todo => {
            const card = document.createElement('div');
            card.className = `todo-card priority-${todo.priority} ${todo.completed ? 'completed' : ''}`;

            const overdue = todo.due_date && todo.due_date < today && !todo.completed;
            const dueBadge = todo.due_date
                ? `<span class="due-date ${overdue ? 'overdue' : ''}">📅 ${todo.due_date}${overdue ? ' ⚠️ 초과' : ''}</span>`
                : '';

            card.innerHTML = `
                <input type="checkbox" class="toggle-check" ${todo.completed ? 'checked' : ''}
                    onchange="toggleTodo(${todo.id})">
                <div class="todo-body">
                    <div class="todo-title">${escapeHtml(todo.title)}</div>
                    <div class="todo-desc">${escapeHtml(todo.description)}</div>
                    <div class="todo-meta">
                        <span class="badge badge-${todo.priority}">${labelPriority(todo.priority)}</span>
                        ${dueBadge}
                    </div>
                </div>
                <div class="todo-actions">
                    <button class="btn btn-warning btn-sm" onclick="openEdit(${todo.id})">수정</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTodo(${todo.id})">삭제</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function labelPriority(p) {
        return { high: '높음', medium: '보통', low: '낮음' }[p] || p;
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTodos(allTodos);
    }

    async function searchTodos() {
        const keyword = document.getElementById('search-input').value.trim();
        if (!keyword) { renderTodos(allTodos); return; }
        const res = await fetch(`/todos/search?keyword=${encodeURIComponent(keyword)}`);
        const results = await res.json();
        renderTodos(results);
    }

    function clearSearch() {
        document.getElementById('search-input').value = '';
        renderTodos(allTodos);
    }

    document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchTodos();
    });

    async function toggleTodo(id) {
        await fetch(`/todos/${id}/toggle`, { method: 'PATCH' });
        fetchTodos();
    }

    async function deleteTodo(id) {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        await fetch(`/todos/${id}`, { method: 'DELETE' });
        fetchTodos();
    }

    function openEdit(id) {
        const todo = allTodos.find(t => t.id === id);
        if (!todo) return;
        editingId = id;
        document.getElementById('edit-title').value = todo.title;
        document.getElementById('edit-description').value = todo.description;
        document.getElementById('edit-priority').value = todo.priority || 'medium';
        document.getElementById('edit-due_date').value = todo.due_date || '';
        document.getElementById('edit-modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('edit-modal').classList.remove('open');
        editingId = null;
    }

    async function saveEdit() {
        const todo = allTodos.find(t => t.id === editingId);
        const updated = {
            id: editingId,
            title: document.getElementById('edit-title').value,
            description: document.getElementById('edit-description').value,
            completed: todo.completed,
            priority: document.getElementById('edit-priority').value,
            due_date: document.getElementById('edit-due_date').value || null,
        };
        const res = await fetch(`/todos/${editingId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updated),
        });
        if (res.ok) { closeModal(); fetchTodos(); }
    }

    document.getElementById('todo-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const due = document.getElementById('due_date').value;
        const body = {
            id: Date.now(),
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            completed: false,
            priority: document.getElementById('priority').value,
            due_date: due || null,
        };
        const res = await fetch('/todos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (res.ok) {
            e.target.reset();
            fetchTodos();
        }
    });

    // 모달 바깥 클릭 시 닫기
    document.getElementById('edit-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    fetchTodos();
</script>
</body>
</html>
