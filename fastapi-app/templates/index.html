<!DOCTYPE html>
<html lang="ko" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Princess's To-Do 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;600;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1:       #ffe4f1;
            --bg-2:       #ffc8e2;
            --bg-3:       #ffd6f5;
            --card:       #fff5fb;
            --card2:      #ffe9f4;
            --border:     #ffb3d9;
            --text:       #b03f7e;
            --text-sub:   #c95ea1;
            --text-muted: #d987b9;
            --text-faint: #f0c0dc;
            --input-bg:   #fff;
            --shadow:     rgba(255, 105, 180, 0.25);
            --shadow-md:  rgba(255, 105, 180, 0.45);
            --accent:     #ff5cad;
            --accent2:    #ff85c0;
            --accent-bg:  #ffe0f0;
            --gold:       #ffd86b;
            --gold2:      #ffb347;
            --pink-deep:  #e63995;
        }

        html.dark {
            --bg-1:       #2a0f24;
            --bg-2:       #3d1535;
            --bg-3:       #4a1a44;
            --card:       #3a1530;
            --card2:      #4a1a40;
            --border:     #8c3a72;
            --text:       #ffe0f0;
            --text-sub:   #ffb3d9;
            --text-muted: #cf85b8;
            --text-faint: #6a3358;
            --input-bg:   #4a1a40;
            --shadow:     rgba(255, 105, 180, 0.4);
            --shadow-md:  rgba(255, 105, 180, 0.6);
            --accent:     #ff7ec4;
            --accent2:    #ffa3d4;
            --accent-bg:  #5a2050;
            --gold:       #ffd86b;
            --gold2:      #ffb347;
            --pink-deep:  #ff9ed1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
            50%      { opacity: 1;   transform: scale(1.2) rotate(180deg); }
        }
        @keyframes float-up {
            0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        @keyframes rainbow-text {
            0%   { background-position:   0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position:   0% 50%; }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-3deg); }
            50%      { transform: rotate( 3deg); }
        }
        @keyframes heart-beat {
            0%, 100% { transform: scale(1);    }
            25%      { transform: scale(1.15); }
            50%      { transform: scale(0.95); }
            75%      { transform: scale(1.1);  }
        }
        @keyframes sparkle-spin {
            from { transform: rotate(0deg)   scale(1);   }
            50%  { transform: rotate(180deg) scale(1.3); }
            to   { transform: rotate(360deg) scale(1);   }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 92, 173, 0.4), 0 0 40px rgba(255, 216, 107, 0.3); }
            50%      { box-shadow: 0 0 35px rgba(255, 92, 173, 0.8), 0 0 70px rgba(255, 216, 107, 0.6); }
        }
        @keyframes bg-pan {
            0%   { background-position:   0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position:   0% 50%; }
        }

        body {
            font-family: 'Quicksand', 'Gaegu', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3), var(--bg-1));
            background-size: 400% 400%;
            animation: bg-pan 18s ease infinite;
            min-height: 100vh;
            padding: 40px 16px;
            color: var(--text);
            transition: color 0.3s;
            overflow-x: hidden;
            position: relative;
        }

        /* ✨ 빤짝이 배경 레이어 (radial 도트들) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle, #fff 1.5px, transparent 2px),
                radial-gradient(circle, #ffd86b 1px, transparent 1.5px),
                radial-gradient(circle, #fff 1px, transparent 1.5px),
                radial-gradient(circle, #ff85c0 1.5px, transparent 2px);
            background-size: 70px 70px, 110px 110px, 50px 50px, 130px 130px;
            background-position: 0 0, 35px 35px, 20px 60px, 80px 10px;
            opacity: 0.7;
            animation: twinkle 3s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle, #fff 1px, transparent 1.5px),
                radial-gradient(circle, #ffd86b 1.5px, transparent 2px),
                radial-gradient(circle, #fff 2px, transparent 2.5px);
            background-size: 90px 90px, 150px 150px, 200px 200px;
            background-position: 45px 25px, 100px 80px, 30px 120px;
            opacity: 0.5;
            animation: twinkle 4.5s ease-in-out infinite reverse;
        }

        /* ✨ 떠다니는 이모지 빤짝이 */
        .sparkle-rain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .sparkle-rain span {
            position: absolute;
            bottom: -40px;
            font-size: 18px;
            animation: float-up linear infinite;
            opacity: 0.8;
            filter: drop-shadow(0 0 6px rgba(255, 215, 100, 0.8));
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 헤더 */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            position: relative;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(90deg, #ff5cad, #ffb347, #ffd86b, #ff85c0, #ff5cad);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow-text 5s linear infinite;
            text-shadow: 0 0 30px rgba(255, 92, 173, 0.4);
            letter-spacing: 0.02em;
        }

        h1 .crown {
            display: inline-block;
            font-size: 1em;
            animation: wiggle 1.6s ease-in-out infinite;
            -webkit-text-fill-color: initial;
        }
        h1 .h-spark {
            display: inline-block;
            font-size: 0.7em;
            animation: sparkle-spin 2s linear infinite;
            -webkit-text-fill-color: initial;
        }

        .version-badge {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.7rem;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #6b3a00;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(255, 183, 71, 0.6);
            vertical-align: middle;
            border: 1.5px solid #fff;
        }

        .dark-toggle {
            position: absolute;
            right: 0;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
            box-shadow: 0 0 12px var(--shadow);
        }
        .dark-toggle:hover {
            transform: scale(1.15) rotate(20deg);
            box-shadow: 0 0 20px var(--shadow-md);
        }

        /* ✨ 탭 */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 28px;
            border: 3px solid var(--border);
            border-radius: 30px;
            background: var(--card);
            cursor: pointer;
            font-family: 'Pacifico', cursive;
            font-size: 1.15rem;
            color: var(--text-sub);
            font-weight: 700;
            transition: all 0.25s;
            box-shadow: 0 3px 10px var(--shadow);
            position: relative;
        }
        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--shadow-md);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-color: var(--gold);
            animation: pulse-glow 2.2s ease-in-out infinite;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        /* 카드 공통 */
        .form-card, .stats-dashboard, .diary-form-card, .diary-stats {
            background: var(--card);
            border: 2.5px solid var(--border);
            border-radius: 22px;
            padding: 24px;
            box-shadow: 0 4px 20px var(--shadow), 0 0 0 4px var(--card) inset;
            margin-bottom: 20px;
            position: relative;
        }
        .form-card::before, .diary-form-card::before {
            content: '✨';
            position: absolute;
            top: -14px;
            left: 20px;
            font-size: 1.6rem;
            animation: sparkle-spin 3s linear infinite;
            filter: drop-shadow(0 0 6px var(--accent));
        }
        .form-card::after, .diary-form-card::after {
            content: '💖';
            position: absolute;
            top: -14px;
            right: 20px;
            font-size: 1.4rem;
            animation: heart-beat 1.4s ease-in-out infinite;
        }

        .form-card h2, .diary-form-card h2 {
            font-family: 'Pacifico', cursive;
            font-size: 1.3rem;
            margin-bottom: 16px;
            color: var(--pink-deep);
            font-weight: 400;
            text-align: center;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="date"], select, textarea {
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 11px 16px;
            font-size: 0.95rem;
            font-family: 'Quicksand', sans-serif;
            outline: none;
            transition: all 0.2s;
            background: var(--input-bg);
            color: var(--text);
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px var(--accent-bg);
        }

        textarea {
            width: 100%;
            resize: vertical;
            min-height: 70px;
            font-family: 'Quicksand', 'Gaegu', sans-serif;
        }

        .input-title    { flex: 2; min-width: 160px; }
        .input-desc     { flex: 3; min-width: 160px; }
        .input-priority { flex: 1; min-width: 110px; }
        .input-category { flex: 1; min-width: 110px; }
        .input-date     { flex: 1.5; min-width: 140px; }

        .btn {
            padding: 11px 22px;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 3px 10px var(--shadow);
        }
        .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 16px var(--shadow-md); }
        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
            background-size: 200% auto;
            color: #fff;
            width: 100%;
            margin-top: 6px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            background-size: 200% 100%;
            animation: shimmer 2.5s linear infinite;
            pointer-events: none;
        }
        .btn-success { background: linear-gradient(135deg, #ff85c0, #ffb3d9); color: #fff; }
        .btn-danger  { background: linear-gradient(135deg, #e63995, #ff5cad); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #6b3a00; }
        .btn-sm      { padding: 6px 14px; font-size: 0.85rem; }

        /* 통계 대시보드 */
        .stats-dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .stats-dashboard-header h2 {
            font-family: 'Pacifico', cursive;
            font-size: 1.15rem;
            color: var(--pink-deep);
            font-weight: 400;
        }
        .stats-version-badge {
            font-size: 0.72rem;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #6b3a00;
            padding: 3px 11px;
            border-radius: 20px;
            font-weight: 700;
            box-shadow: 0 1px 6px rgba(255, 183, 71, 0.5);
        }

        .stats-numbers { display: flex; gap: 12px; margin-bottom: 14px; }
        .stat-box {
            flex: 1;
            background: linear-gradient(135deg, var(--card2), var(--card));
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-box:hover { transform: translateY(-3px) scale(1.03); }
        .stat-box .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text); line-height: 1; }
        .stat-box .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-weight: 700; }
        .stat-box.completed-box .stat-value { color: #ff85c0; }
        .stat-box.pending-box   .stat-value { color: var(--pink-deep); }

        .progress-wrap { margin-bottom: 14px; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: var(--text-sub);
            margin-bottom: 6px;
            font-weight: 700;
        }
        .progress-bar-bg { background: var(--card2); border: 1.5px solid var(--border); border-radius: 20px; height: 14px; overflow: hidden; }
        .progress-bar-fill {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
            transition: width 0.5s ease;
        }

        .priority-bars { display: flex; flex-direction: column; gap: 7px; }
        .priority-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .priority-row .p-label        { width: 44px; font-weight: 700; }
        .priority-row .p-label.high   { color: #e63995; }
        .priority-row .p-label.medium { color: var(--gold2); }
        .priority-row .p-label.low    { color: #ff85c0; }
        .priority-row .p-bar-bg       { flex: 1; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; height: 9px; overflow: hidden; }
        .priority-row .p-bar-fill     { height: 100%; border-radius: 20px; transition: width 0.5s ease; }
        .p-bar-fill.high              { background: linear-gradient(90deg, #e63995, #ff5cad); }
        .p-bar-fill.medium            { background: linear-gradient(90deg, var(--gold2), var(--gold)); }
        .p-bar-fill.low               { background: linear-gradient(90deg, #ff85c0, #ffb3d9); }
        .priority-row .p-count        { width: 26px; text-align: right; color: var(--text-sub); font-weight: 800; }

        /* 툴바 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-wrap { display: flex; flex: 1; min-width: 200px; gap: 8px; }
        .search-wrap input { flex: 1; }
        .filter-wrap { display: flex; gap: 6px; }

        .filter-btn {
            padding: 9px 18px;
            border: 2.5px solid var(--border);
            border-radius: 22px;
            background: var(--card);
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'Quicksand', sans-serif;
        }
        .filter-btn:hover { transform: translateY(-2px); }
        .filter-btn.active {
            border-color: var(--accent);
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 3px 10px var(--shadow);
        }

        .sub-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .priority-filter-wrap, .category-filter-wrap, .mood-filter-wrap {
            display: flex; gap: 6px; flex-wrap: wrap;
        }

        .pf-btn, .cf-btn, .mf-btn {
            padding: 7px 14px;
            border: 2.5px solid var(--border);
            border-radius: 22px;
            background: var(--card);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'Quicksand', sans-serif;
        }
        .pf-btn:hover, .cf-btn:hover, .mf-btn:hover { transform: translateY(-2px); }

        .pf-btn.active-all    { border-color: var(--accent); color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
        .pf-btn.active-high   { border-color: #e63995; color: #fff; background: linear-gradient(135deg, #e63995, #ff5cad); }
        .pf-btn.active-medium { border-color: var(--gold2); color: #6b3a00; background: linear-gradient(135deg, var(--gold), var(--gold2)); }
        .pf-btn.active-low    { border-color: #ff85c0; color: #fff; background: linear-gradient(135deg, #ff85c0, #ffb3d9); }

        .cf-btn.active-all      { border-color: var(--accent); color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
        .cf-btn.active-work     { border-color: #c39bd3; color: #fff; background: linear-gradient(135deg, #c39bd3, #d7bde2); }
        .cf-btn.active-study    { border-color: #9b59b6; color: #fff; background: linear-gradient(135deg, #bb8fce, #c39bd3); }
        .cf-btn.active-exercise { border-color: var(--gold2); color: #6b3a00; background: linear-gradient(135deg, var(--gold), var(--gold2)); }
        .cf-btn.active-hobby    { border-color: #ff85c0; color: #fff; background: linear-gradient(135deg, #ff85c0, #ffb3d9); }
        .cf-btn.active-other    { border-color: #d4a5c6; color: #fff; background: linear-gradient(135deg, #d4a5c6, #e8c5d8); }

        .sort-select {
            padding: 7px 14px;
            border: 2.5px solid var(--border);
            border-radius: 22px;
            background: var(--card);
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
        }

        /* Todo 카드 */
        .todo-list { display: flex; flex-direction: column; gap: 12px; }
        .todo-card {
            background: var(--card);
            border: 2.5px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            box-shadow: 0 3px 12px var(--shadow);
            display: flex;
            align-items: flex-start;
            gap: 14px;
            border-left: 6px solid var(--border);
            transition: all 0.25s;
            position: relative;
        }
        .todo-card:hover {
            box-shadow: 0 8px 24px var(--shadow-md);
            transform: translateY(-3px);
        }
        .todo-card.completed { opacity: 0.65; }
        .todo-card.completed .todo-title { text-decoration: line-through; color: var(--text-muted); }

        .todo-card.priority-high   { border-left-color: #e63995; }
        .todo-card.priority-medium { border-left-color: var(--gold2); }
        .todo-card.priority-low    { border-left-color: #ff85c0; }

        .toggle-check {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0;
            margin-top: 3px;
        }

        .todo-body  { flex: 1; }
        .todo-title {
            font-size: 1.08rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text);
        }
        .todo-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 8px;
        }
        .todo-notes {
            font-family: 'Gaegu', 'Quicksand', sans-serif;
            font-size: 0.88rem;
            color: var(--text-sub);
            background: var(--card2);
            border: 1.5px dashed var(--border);
            border-radius: 10px;
            padding: 6px 10px;
            margin: 6px 0;
            white-space: pre-wrap;
        }
        .todo-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .badge {
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 0.74rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            box-shadow: 0 1px 4px rgba(255, 105, 180, 0.2);
        }
        .badge-high   { background: linear-gradient(135deg, #e63995, #ff5cad); color: #fff; }
        .badge-medium { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #6b3a00; }
        .badge-low    { background: linear-gradient(135deg, #ff85c0, #ffb3d9); color: #fff; }

        .badge-cat-work     { background: linear-gradient(135deg, #c39bd3, #d7bde2); color: #fff; }
        .badge-cat-study    { background: linear-gradient(135deg, #bb8fce, #c39bd3); color: #fff; }
        .badge-cat-exercise { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #6b3a00; }
        .badge-cat-hobby    { background: linear-gradient(135deg, #ff85c0, #ffb3d9); color: #fff; }
        .badge-cat-other    { background: linear-gradient(135deg, #d4a5c6, #e8c5d8); color: #fff; }

        .dday {
            display: inline-block;
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
        }
        .dday-over    { background: linear-gradient(135deg, #e63995, #ff5cad); color: #fff; }
        .dday-today   { background: linear-gradient(135deg, #ff5cad, var(--gold)); color: #fff; animation: heart-beat 1s infinite; }
        .dday-urgent  { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #6b3a00; }
        .dday-soon    { background: var(--card2); color: var(--gold2); border: 1.5px solid var(--gold); }
        .dday-normal  { background: var(--card2); color: var(--text-muted); border: 1.5px solid var(--border); }

        .todo-actions { display: flex; gap: 6px; flex-shrink: 0; }

        /* ───── 일기장 ───── */
        .diary-section { display: none; }
        .diary-section.active { display: block; }
        .todo-section.hidden { display: none; }

        .diary-list { display: flex; flex-direction: column; gap: 14px; }
        .diary-card {
            background: var(--card);
            border: 3px solid var(--border);
            border-radius: 20px;
            padding: 18px 22px;
            box-shadow: 0 4px 16px var(--shadow);
            position: relative;
            transition: all 0.25s;
        }
        .diary-card:hover {
            transform: translateY(-3px) rotate(-0.4deg);
            box-shadow: 0 10px 26px var(--shadow-md);
        }
        .diary-card::before {
            content: '🎀';
            position: absolute;
            top: -16px;
            left: 18px;
            font-size: 1.6rem;
            animation: wiggle 2.5s ease-in-out infinite;
        }

        .diary-card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .diary-date {
            font-family: 'Pacifico', cursive;
            font-size: 1.05rem;
            color: var(--pink-deep);
        }
        .diary-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            margin: 4px 0 10px;
        }
        .diary-content {
            font-family: 'Gaegu', 'Quicksand', sans-serif;
            font-size: 1.05rem;
            color: var(--text-sub);
            line-height: 1.65;
            white-space: pre-wrap;
            background: var(--card2);
            border: 1.5px dashed var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 10px;
        }
        .diary-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .mood-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: 0 1px 4px rgba(255, 105, 180, 0.3);
        }
        .mood-happy    { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #6b3a00; }
        .mood-sad      { background: linear-gradient(135deg, #a8c5ed, #c5d8f0); color: #2c4870; }
        .mood-angry    { background: linear-gradient(135deg, #e63995, #ff5cad); color: #fff; }
        .mood-tired    { background: linear-gradient(135deg, #c39bd3, #d7bde2); color: #fff; }
        .mood-love     { background: linear-gradient(135deg, #ff85c0, #ffb3d9); color: #fff; }
        .mood-thinking { background: linear-gradient(135deg, #ffd6f5, #ffe9f4); color: var(--pink-deep); }

        .mf-btn.active-all      { border-color: var(--accent); color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
        .mf-btn.active-happy    { border-color: var(--gold2); color: #6b3a00; background: linear-gradient(135deg, var(--gold), var(--gold2)); }
        .mf-btn.active-sad      { border-color: #a8c5ed; color: #2c4870; background: linear-gradient(135deg, #a8c5ed, #c5d8f0); }
        .mf-btn.active-angry    { border-color: #e63995; color: #fff; background: linear-gradient(135deg, #e63995, #ff5cad); }
        .mf-btn.active-tired    { border-color: #c39bd3; color: #fff; background: linear-gradient(135deg, #c39bd3, #d7bde2); }
        .mf-btn.active-love     { border-color: #ff85c0; color: #fff; background: linear-gradient(135deg, #ff85c0, #ffb3d9); }
        .mf-btn.active-thinking { border-color: var(--accent); color: var(--pink-deep); background: linear-gradient(135deg, #ffd6f5, #ffe9f4); }

        .diary-stats { padding: 18px 22px; }
        .diary-stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .diary-stats-header h2 {
            font-family: 'Pacifico', cursive;
            font-size: 1.1rem;
            color: var(--pink-deep);
            font-weight: 400;
        }
        .diary-mood-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .mood-stat-box {
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 8px 6px;
            text-align: center;
            font-size: 0.82rem;
        }
        .mood-stat-box .ms-icon { font-size: 1.4rem; display: block; margin-bottom: 3px; }
        .mood-stat-box .ms-count { font-weight: 800; color: var(--text); font-size: 1.1rem; }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(180, 60, 140, 0.4);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card);
            border: 3px solid var(--gold);
            border-radius: 22px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 12px 50px var(--shadow-md);
            animation: pulse-glow 3s ease-in-out infinite;
            position: relative;
        }
        .modal::before {
            content: '👑';
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            animation: wiggle 1.6s ease-in-out infinite;
        }
        .modal h2 {
            font-family: 'Pacifico', cursive;
            margin-bottom: 18px;
            font-size: 1.4rem;
            color: var(--pink-deep);
            text-align: center;
        }
        .modal .form-row { flex-direction: column; }
        .modal input, .modal select, .modal textarea { width: 100%; margin-bottom: 10px; }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .btn-secondary {
            background: var(--card2);
            color: var(--text-sub);
            border: 2px solid var(--border);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 50px 0;
            font-size: 1.1rem;
            font-family: 'Pacifico', cursive;
        }
        .empty-state .es-icon {
            display: block;
            font-size: 3rem;
            margin-bottom: 10px;
            animation: heart-beat 1.8s ease-in-out infinite;
        }
    </style>
</head>
<body>

<!-- ✨ 떠다니는 빤짝이 ✨ -->
<div class="sparkle-rain" id="sparkle-rain"></div>

<div class="container">

    <!-- 헤더 -->
    <div class="header-row">
        <h1>
            <span class="crown">👑</span>
            Princess's To-Do
            <span class="h-spark">✨</span>
        </h1>
        <span class="version-badge">v7.0.0 💖</span>
        <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()" title="밤하늘 공주모드">🌙</button>
    </div>

    <!-- 탭 -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-todo"  onclick="switchTab('todo')">💕 할 일</button>
        <button class="tab-btn"        id="tab-diary" onclick="switchTab('diary')">📔 일기장</button>
    </div>

    <!-- ═══════════════ TODO 섹션 ═══════════════ -->
    <div class="todo-section" id="todo-section">

        <!-- 입력 폼 -->
        <div class="form-card">
            <h2>💖 새 할 일 추가 💖</h2>
            <form id="todo-form">
                <div class="form-row">
                    <input class="input-title" type="text" id="title" placeholder="제목 ✨" required>
                    <input class="input-desc"  type="text" id="description" placeholder="설명 🎀" required>
                </div>
                <div class="form-row">
                    <select class="input-priority" id="priority">
                        <option value="high">💖 높음</option>
                        <option value="medium" selected>🌟 보통</option>
                        <option value="low">🍬 낮음</option>
                    </select>
                    <select class="input-category" id="category">
                        <option value="work">💼 일</option>
                        <option value="study">📚 공부</option>
                        <option value="exercise">🏃 운동</option>
                        <option value="hobby">🎨 취미</option>
                        <option value="other" selected>📌 기타</option>
                    </select>
                    <input class="input-date" type="date" id="due_date">
                </div>
                <div class="form-row">
                    <textarea id="notes" placeholder="메모 (선택) — 비밀스러운 메모를 적어보세요 🎀"></textarea>
                </div>
                <button class="btn btn-primary" type="submit">✨ 추가하기 ✨</button>
            </form>
        </div>

        <!-- 통계 대시보드 -->
        <div class="stats-dashboard">
            <div class="stats-dashboard-header">
                <h2>🌟 통계 대시보드 🌟</h2>
                <span class="stats-version-badge">v4.0.0+</span>
            </div>
            <div class="stats-numbers">
                <div class="stat-box">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">전체</div>
                </div>
                <div class="stat-box completed-box">
                    <div class="stat-value" id="stat-completed">0</div>
                    <div class="stat-label">완료</div>
                </div>
                <div class="stat-box pending-box">
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label">미완료</div>
                </div>
            </div>
            <div class="progress-wrap">
                <div class="progress-label">
                    <span>👑 완료율</span>
                    <span id="stat-rate">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="stat-bar" style="width:0%"></div>
                </div>
            </div>
            <div class="priority-bars">
                <div class="priority-row">
                    <span class="p-label high">높음</span>
                    <div class="p-bar-bg"><div class="p-bar-fill high" id="bar-high" style="width:0%"></div></div>
                    <span class="p-count" id="cnt-high">0</span>
                </div>
                <div class="priority-row">
                    <span class="p-label medium">보통</span>
                    <div class="p-bar-bg"><div class="p-bar-fill medium" id="bar-medium" style="width:0%"></div></div>
                    <span class="p-count" id="cnt-medium">0</span>
                </div>
                <div class="priority-row">
                    <span class="p-label low">낮음</span>
                    <div class="p-bar-bg"><div class="p-bar-fill low" id="bar-low" style="width:0%"></div></div>
                    <span class="p-count" id="cnt-low">0</span>
                </div>
            </div>
        </div>

        <!-- 검색 + 완료 필터 -->
        <div class="toolbar">
            <div class="search-wrap">
                <input type="text" id="search-input" placeholder="🔍 제목으로 검색...">
                <button class="btn btn-warning btn-sm" onclick="searchTodos()">검색</button>
                <button class="btn btn-sm btn-secondary" onclick="clearSearch()">초기화</button>
            </div>
            <div class="filter-wrap">
                <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
                <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
                <button class="filter-btn" onclick="setFilter('completed', this)">완료</button>
            </div>
        </div>

        <!-- Priority 필터 + 정렬 -->
        <div class="sub-toolbar">
            <div class="priority-filter-wrap">
                <button class="pf-btn active-all" onclick="setPriorityFilter('all', this)">전체</button>
                <button class="pf-btn" onclick="setPriorityFilter('high', this)">💖 높음</button>
                <button class="pf-btn" onclick="setPriorityFilter('medium', this)">🌟 보통</button>
                <button class="pf-btn" onclick="setPriorityFilter('low', this)">🍬 낮음</button>
            </div>
            <select class="sort-select" id="sort-select" onchange="renderTodos(allTodos)">
                <option value="default">기본순</option>
                <option value="priority">우선순위순</option>
                <option value="duedate">마감일순</option>
                <option value="title">제목순</option>
            </select>
        </div>

        <!-- 카테고리 필터 -->
        <div class="sub-toolbar">
            <div class="category-filter-wrap">
                <button class="cf-btn active-all" onclick="setCategoryFilter('all', this)">전체</button>
                <button class="cf-btn" onclick="setCategoryFilter('work', this)">💼 일</button>
                <button class="cf-btn" onclick="setCategoryFilter('study', this)">📚 공부</button>
                <button class="cf-btn" onclick="setCategoryFilter('exercise', this)">🏃 운동</button>
                <button class="cf-btn" onclick="setCategoryFilter('hobby', this)">🎨 취미</button>
                <button class="cf-btn" onclick="setCategoryFilter('other', this)">📌 기타</button>
            </div>
        </div>

        <div class="todo-list" id="todo-list"></div>
    </div>

    <!-- ═══════════════ DIARY 섹션 ═══════════════ -->
    <div class="diary-section" id="diary-section">

        <!-- 일기 입력 -->
        <div class="diary-form-card">
            <h2>📔 오늘의 일기 ✨</h2>
            <form id="diary-form">
                <div class="form-row">
                    <input class="input-date" type="date" id="diary-date" required>
                    <input class="input-title" type="text" id="diary-title" placeholder="오늘의 제목 💖" required>
                </div>
                <div class="form-row">
                    <select id="diary-mood">
                        <option value="happy" selected>😊 행복</option>
                        <option value="sad">😢 Queen never cry</option>
                        <option value="angry">😡 화남</option>
                        <option value="tired">😴 피곤</option>
                        <option value="love">🥰 사랑</option>
                        <option value="thinking">🤔 생각중</option>
                    </select>
                </div>
                <div class="form-row">
                    <textarea id="diary-content" placeholder="오늘 있었던 일을 적어보세요... 🎀✨" rows="5" required></textarea>
                </div>
                <button class="btn btn-primary" type="submit">💖 일기 저장 💖</button>
            </form>
        </div>

        <!-- 무드 통계 -->
        <div class="diary-stats">
            <div class="diary-stats-header">
                <h2>🌈 무드 통계 🌈</h2>
                <span class="stats-version-badge">총 <span id="diary-total">0</span>편</span>
            </div>
            <div class="diary-mood-stats">
                <div class="mood-stat-box"><span class="ms-icon">😊</span><span class="ms-count" id="mc-happy">0</span></div>
                <div class="mood-stat-box"><span class="ms-icon">😢</span><span class="ms-count" id="mc-sad">0</span></div>
                <div class="mood-stat-box"><span class="ms-icon">😡</span><span class="ms-count" id="mc-angry">0</span></div>
                <div class="mood-stat-box"><span class="ms-icon">😴</span><span class="ms-count" id="mc-tired">0</span></div>
                <div class="mood-stat-box"><span class="ms-icon">🥰</span><span class="ms-count" id="mc-love">0</span></div>
                <div class="mood-stat-box"><span class="ms-icon">🤔</span><span class="ms-count" id="mc-thinking">0</span></div>
            </div>
        </div>

        <!-- 무드 필터 -->
        <div class="sub-toolbar">
            <div class="mood-filter-wrap">
                <button class="mf-btn active-all" onclick="setMoodFilter('all', this)">전체</button>
                <button class="mf-btn" onclick="setMoodFilter('happy', this)">😊 행복</button>
                <button class="mf-btn" onclick="setMoodFilter('sad', this)">😢 Queen never cry</button>
                <button class="mf-btn" onclick="setMoodFilter('angry', this)">😡 화남</button>
                <button class="mf-btn" onclick="setMoodFilter('tired', this)">😴 피곤</button>
                <button class="mf-btn" onclick="setMoodFilter('love', this)">🥰 사랑</button>
                <button class="mf-btn" onclick="setMoodFilter('thinking', this)">🤔 생각중</button>
            </div>
        </div>

        <div class="diary-list" id="diary-list"></div>
    </div>
</div>

<!-- 편집 모달 (Todo) -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal">
        <h2>✨ 할 일 수정 ✨</h2>
        <div class="form-row">
            <input type="text" id="edit-title" placeholder="제목">
            <input type="text" id="edit-description" placeholder="설명">
            <select id="edit-priority">
                <option value="high">💖 높음</option>
                <option value="medium">🌟 보통</option>
                <option value="low">🍬 낮음</option>
            </select>
            <select id="edit-category">
                <option value="work">💼 일</option>
                <option value="study">📚 공부</option>
                <option value="exercise">🏃 운동</option>
                <option value="hobby">🎨 취미</option>
                <option value="other">📌 기타</option>
            </select>
            <input type="date" id="edit-due_date">
            <textarea id="edit-notes" placeholder="메모 (선택)"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" style="width:auto;" onclick="saveEdit()">저장 💖</button>
        </div>
    </div>
</div>

<!-- 편집 모달 (Diary) -->
<div class="modal-overlay" id="diary-edit-modal">
    <div class="modal">
        <h2>📔 일기 수정 📔</h2>
        <div class="form-row">
            <input type="date" id="diary-edit-date">
            <input type="text" id="diary-edit-title" placeholder="제목">
            <select id="diary-edit-mood">
                <option value="happy">😊 행복</option>
                <option value="sad">😢 Queen never cry</option>
                <option value="angry">😡 화남</option>
                <option value="tired">😴 피곤</option>
                <option value="love">🥰 사랑</option>
                <option value="thinking">🤔 생각중</option>
            </select>
            <textarea id="diary-edit-content" placeholder="내용" rows="6"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeDiaryModal()">취소</button>
            <button class="btn btn-primary" style="width:auto;" onclick="saveDiaryEdit()">저장 💖</button>
        </div>
    </div>
</div>

<script>
    // ─────────────────────────────────────────
    // 빤짝이 비 (떠다니는 이모지 생성)
    // ─────────────────────────────────────────
    (function initSparkleRain() {
        const rain = document.getElementById('sparkle-rain');
        const symbols = ['✨', '💖', '🌟', '🎀', '💕', '⭐', '🦄', '👑', '💎', '🌸'];
        const count = 28;
        for (let i = 0; i < count; i++) {
            const span = document.createElement('span');
            span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            span.style.left      = (Math.random() * 100) + 'vw';
            span.style.fontSize  = (12 + Math.random() * 18) + 'px';
            span.style.animationDuration = (8 + Math.random() * 10) + 's';
            span.style.animationDelay    = (Math.random() * 12) + 's';
            rain.appendChild(span);
        }
    })();

    // ─────────────────────────────────────────
    // 다크모드
    // ─────────────────────────────────────────
    function toggleDark() {
        const html = document.getElementById('html-root');
        const isDark = html.classList.toggle('dark');
        document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('darkMode', isDark ? '1' : '0');
    }
    (function initDark() {
        if (localStorage.getItem('darkMode') === '1') {
            document.getElementById('html-root').classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️';
        }
    })();

    // ─────────────────────────────────────────
    // 탭 전환
    // ─────────────────────────────────────────
    function switchTab(tab) {
        const todoSec  = document.getElementById('todo-section');
        const diarySec = document.getElementById('diary-section');
        const tabTodo  = document.getElementById('tab-todo');
        const tabDiary = document.getElementById('tab-diary');
        if (tab === 'todo') {
            todoSec.classList.remove('hidden');
            diarySec.classList.remove('active');
            tabTodo.classList.add('active');
            tabDiary.classList.remove('active');
        } else {
            todoSec.classList.add('hidden');
            diarySec.classList.add('active');
            tabTodo.classList.remove('active');
            tabDiary.classList.add('active');
            fetchDiary();
        }
    }

    // ═════════════════════════════════════════
    // TODO 로직
    // ═════════════════════════════════════════
    let currentFilter   = 'all';
    let currentPriority = 'all';
    let currentCategory = 'all';
    let allTodos        = [];
    let editingId       = null;

    async function fetchStats() {
        const res  = await fetch('/todos/stats');
        const data = await res.json();
        document.getElementById('stat-total').textContent     = data.total;
        document.getElementById('stat-completed').textContent = data.completed;
        document.getElementById('stat-pending').textContent   = data.pending;
        document.getElementById('stat-rate').textContent      = data.completion_rate + '%';
        document.getElementById('stat-bar').style.width       = data.completion_rate + '%';

        const max = Math.max(data.by_priority.high, data.by_priority.medium, data.by_priority.low, 1);
        ['high', 'medium', 'low'].forEach(p => {
            const cnt = data.by_priority[p];
            document.getElementById('cnt-' + p).textContent  = cnt;
            document.getElementById('bar-' + p).style.width  = (cnt / max * 100) + '%';
        });
    }

    async function fetchTodos() {
        const params = new URLSearchParams();
        if (currentPriority !== 'all') params.set('priority', currentPriority);
        if (currentCategory !== 'all') params.set('category', currentCategory);
        const qs  = params.toString();
        const url = qs ? `/todos?${qs}` : '/todos';
        const res = await fetch(url);
        allTodos  = await res.json();
        renderTodos(allTodos);
        fetchStats();
    }

    function calcDday(dueDate) {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const due   = new Date(dueDate); due.setHours(0, 0, 0, 0);
        return Math.round((due - today) / 86400000);
    }

    function ddayBadge(dueDate, completed) {
        if (!dueDate) return '';
        const diff = calcDday(dueDate);
        if (completed) return `<span class="dday dday-normal">📅 ${dueDate}</span>`;
        if (diff < 0)  return `<span class="dday dday-over">💔 D+${Math.abs(diff)}</span>`;
        if (diff === 0) return `<span class="dday dday-today">🔥 D-Day!</span>`;
        if (diff <= 3)  return `<span class="dday dday-urgent">⚠️ D-${diff}</span>`;
        if (diff <= 7)  return `<span class="dday dday-soon">📅 D-${diff}</span>`;
        return `<span class="dday dday-normal">📅 D-${diff}</span>`;
    }

    const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

    function sortTodos(todos) {
        const key = document.getElementById('sort-select').value;
        const arr = [...todos];
        if (key === 'priority') {
            arr.sort((a, b) => (PRIORITY_ORDER[a.priority] ?? 1) - (PRIORITY_ORDER[b.priority] ?? 1));
        } else if (key === 'duedate') {
            arr.sort((a, b) => {
                if (!a.due_date && !b.due_date) return 0;
                if (!a.due_date) return 1;
                if (!b.due_date) return -1;
                return a.due_date.localeCompare(b.due_date);
            });
        } else if (key === 'title') {
            arr.sort((a, b) => a.title.localeCompare(b.title, 'ko'));
        }
        return arr;
    }

    function renderTodos(todos) {
        let filtered = todos;
        if (currentFilter === 'active')    filtered = todos.filter(t => !t.completed);
        if (currentFilter === 'completed') filtered = todos.filter(t =>  t.completed);
        filtered = sortTodos(filtered);

        const list = document.getElementById('todo-list');
        list.innerHTML = '';

        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state"><span class="es-icon">🦄</span>아직 할 일이 없어요 ✨</div>';
            return;
        }

        filtered.forEach(todo => {
            const card = document.createElement('div');
            const cat  = todo.category || 'other';
            card.className = `todo-card priority-${todo.priority} category-${cat} ${todo.completed ? 'completed' : ''}`;

            const notesHtml = todo.notes ? `<div class="todo-notes">🎀 ${escapeHtml(todo.notes)}</div>` : '';

            card.innerHTML = `
                <input type="checkbox" class="toggle-check" ${todo.completed ? 'checked' : ''}
                    onchange="toggleTodo(${todo.id})">
                <div class="todo-body">
                    <div class="todo-title">${escapeHtml(todo.title)}</div>
                    <div class="todo-desc">${escapeHtml(todo.description)}</div>
                    ${notesHtml}
                    <div class="todo-meta">
                        <span class="badge badge-${todo.priority}">${labelPriority(todo.priority)}</span>
                        <span class="badge badge-cat-${cat}">${labelCategory(cat)}</span>
                        ${ddayBadge(todo.due_date, todo.completed)}
                    </div>
                </div>
                <div class="todo-actions">
                    <button class="btn btn-warning btn-sm" onclick="openEdit(${todo.id})">수정</button>
                    <button class="btn btn-danger  btn-sm" onclick="deleteTodo(${todo.id})">삭제</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTodos(allTodos);
    }

    function setPriorityFilter(p, btn) {
        currentPriority = p;
        document.querySelectorAll('.pf-btn').forEach(b => b.className = 'pf-btn');
        btn.classList.add('active-' + p);
        fetchTodos();
    }

    function setCategoryFilter(c, btn) {
        currentCategory = c;
        document.querySelectorAll('.cf-btn').forEach(b => b.className = 'cf-btn');
        btn.classList.add('active-' + c);
        fetchTodos();
    }

    async function searchTodos() {
        const keyword = document.getElementById('search-input').value.trim();
        if (!keyword) { renderTodos(allTodos); return; }
        const res = await fetch(`/todos/search?keyword=${encodeURIComponent(keyword)}`);
        renderTodos(await res.json());
    }

    function clearSearch() {
        document.getElementById('search-input').value = '';
        renderTodos(allTodos);
    }

    document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchTodos();
    });

    async function toggleTodo(id) {
        await fetch(`/todos/${id}/toggle`, { method: 'PATCH' });
        fetchTodos();
    }

    async function deleteTodo(id) {
        if (!confirm('💔 정말 삭제할까요?')) return;
        await fetch(`/todos/${id}`, { method: 'DELETE' });
        fetchTodos();
    }

    function openEdit(id) {
        const todo = allTodos.find(t => t.id === id);
        if (!todo) return;
        editingId = id;
        document.getElementById('edit-title').value       = todo.title;
        document.getElementById('edit-description').value = todo.description;
        document.getElementById('edit-priority').value    = todo.priority || 'medium';
        document.getElementById('edit-category').value    = todo.category || 'other';
        document.getElementById('edit-due_date').value    = todo.due_date || '';
        document.getElementById('edit-notes').value       = todo.notes || '';
        document.getElementById('edit-modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('edit-modal').classList.remove('open');
        editingId = null;
    }

    async function saveEdit() {
        const todo = allTodos.find(t => t.id === editingId);
        const updated = {
            id:          editingId,
            title:       document.getElementById('edit-title').value,
            description: document.getElementById('edit-description').value,
            completed:   todo.completed,
            priority:    document.getElementById('edit-priority').value,
            category:    document.getElementById('edit-category').value,
            due_date:    document.getElementById('edit-due_date').value || null,
            notes:       document.getElementById('edit-notes').value || null,
        };
        const res = await fetch(`/todos/${editingId}`, {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(updated),
        });
        if (res.ok) { closeModal(); fetchTodos(); }
    }

    document.getElementById('todo-form').addEventListener('submit', async e => {
        e.preventDefault();
        const body = {
            id:          Date.now(),
            title:       document.getElementById('title').value,
            description: document.getElementById('description').value,
            completed:   false,
            priority:    document.getElementById('priority').value,
            category:    document.getElementById('category').value,
            due_date:    document.getElementById('due_date').value || null,
            notes:       document.getElementById('notes').value || null,
        };
        const res = await fetch('/todos', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(body),
        });
        if (res.ok) { e.target.reset(); fetchTodos(); }
    });

    document.getElementById('edit-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ═════════════════════════════════════════
    // 일기장 로직
    // ═════════════════════════════════════════
    let currentMood   = 'all';
    let allDiary      = [];
    let editingDiary  = null;

    const MOOD_LABEL = {
        happy:    '😊 행복',
        sad:      '😢 Queen never cry',
        angry:    '😡 화남',
        tired:    '😴 피곤',
        love:     '🥰 사랑',
        thinking: '🤔 생각중',
    };

    async function fetchDiary() {
        const params = new URLSearchParams();
        if (currentMood !== 'all') params.set('mood', currentMood);
        const qs  = params.toString();
        const url = qs ? `/diary?${qs}` : '/diary';
        const res = await fetch(url);
        allDiary  = await res.json();
        renderDiary(allDiary);
        fetchDiaryStats();
    }

    async function fetchDiaryStats() {
        const res  = await fetch('/diary/stats');
        const data = await res.json();
        document.getElementById('diary-total').textContent = data.total;
        ['happy', 'sad', 'angry', 'tired', 'love', 'thinking'].forEach(m => {
            document.getElementById('mc-' + m).textContent = data.by_mood[m];
        });
    }

    function renderDiary(entries) {
        const list = document.getElementById('diary-list');
        list.innerHTML = '';
        if (entries.length === 0) {
            list.innerHTML = '<div class="empty-state"><span class="es-icon">📔</span>아직 작성된 일기가 없어요 💕</div>';
            return;
        }
        entries.forEach(entry => {
            const mood = entry.mood || 'happy';
            const card = document.createElement('div');
            card.className = 'diary-card';
            card.innerHTML = `
                <div class="diary-card-head">
                    <span class="diary-date">💖 ${escapeHtml(entry.date)}</span>
                    <span class="mood-badge mood-${mood}">${MOOD_LABEL[mood] || mood}</span>
                </div>
                <div class="diary-title">${escapeHtml(entry.title)}</div>
                <div class="diary-content">${escapeHtml(entry.content)}</div>
                <div class="diary-actions">
                    <button class="btn btn-warning btn-sm" onclick="openDiaryEdit(${entry.id})">수정</button>
                    <button class="btn btn-danger  btn-sm" onclick="deleteDiary(${entry.id})">삭제</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function setMoodFilter(m, btn) {
        currentMood = m;
        document.querySelectorAll('.mf-btn').forEach(b => b.className = 'mf-btn');
        btn.classList.add('active-' + m);
        fetchDiary();
    }

    async function deleteDiary(id) {
        if (!confirm('💔 정말 삭제할까요?')) return;
        await fetch(`/diary/${id}`, { method: 'DELETE' });
        fetchDiary();
    }

    function openDiaryEdit(id) {
        const e = allDiary.find(x => x.id === id);
        if (!e) return;
        editingDiary = id;
        document.getElementById('diary-edit-date').value    = e.date;
        document.getElementById('diary-edit-title').value   = e.title;
        document.getElementById('diary-edit-mood').value    = e.mood || 'happy';
        document.getElementById('diary-edit-content').value = e.content;
        document.getElementById('diary-edit-modal').classList.add('open');
    }

    function closeDiaryModal() {
        document.getElementById('diary-edit-modal').classList.remove('open');
        editingDiary = null;
    }

    async function saveDiaryEdit() {
        const updated = {
            id:      editingDiary,
            date:    document.getElementById('diary-edit-date').value,
            title:   document.getElementById('diary-edit-title').value,
            content: document.getElementById('diary-edit-content').value,
            mood:    document.getElementById('diary-edit-mood').value,
        };
        const res = await fetch(`/diary/${editingDiary}`, {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(updated),
        });
        if (res.ok) { closeDiaryModal(); fetchDiary(); }
    }

    document.getElementById('diary-form').addEventListener('submit', async e => {
        e.preventDefault();
        const body = {
            id:      Date.now(),
            date:    document.getElementById('diary-date').value,
            title:   document.getElementById('diary-title').value,
            content: document.getElementById('diary-content').value,
            mood:    document.getElementById('diary-mood').value,
        };
        const res = await fetch('/diary', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(body),
        });
        if (res.ok) { e.target.reset(); document.getElementById('diary-mood').value = 'happy'; fetchDiary(); }
    });

    document.getElementById('diary-edit-modal').addEventListener('click', function(e) {
        if (e.target === this) closeDiaryModal();
    });

    // 오늘 날짜 기본값
    (function setTodayDate() {
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('diary-date').value = today;
    })();

    // ─────────────────────────────────────────
    // 유틸
    // ─────────────────────────────────────────
    function labelPriority(p) {
        return { high: '높음', medium: '보통', low: '낮음' }[p] || p;
    }
    function labelCategory(c) {
        return { work: '일', study: '공부', exercise: '운동', hobby: '취미', other: '기타' }[c] || c;
    }
    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    fetchTodos();
</script>
</body>
</html>
